---
{{- if .Values.scriptRunner.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "matillion-runner.scriptRunner.fullname" . }}-keys
  namespace: {{ .Release.Namespace }}
  labels:
    app: matillion
{{- include "matillion-runner.labels" . | nindent 4 }}
stringData:
  # The agent's public key(s); the runner image installs this into the mtln
  # user's authorized_keys (mounted at /run/secrets/runner_authorized_keys).
  runner_authorized_keys: {{ required "scriptRunner.authorizedKeys is required when scriptRunner.enabled" .Values.scriptRunner.authorizedKeys | quote }}
  {{- if .Values.scriptRunner.privateKey }}
  # The agent's private key for connecting to the runner. Held here so the agent
  # side can consume it; NOT mounted into the runner pod.
  agent_private_key: {{ .Values.scriptRunner.privateKey | quote }}
  {{- end }}
{{- end }}
