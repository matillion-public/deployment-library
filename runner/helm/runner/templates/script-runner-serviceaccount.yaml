---
{{- if .Values.scriptRunner.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "matillion-runner.scriptRunner.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}
  {{- if eq (include "matillion-runner.cloudProvider" .) "aws" }}
  {{- if not .Values.aws.local.enabled }}
  annotations:
    eks.amazonaws.com/role-arn: {{ required "scriptRunner.serviceAccount.roleArn is required for AWS deployments when not using local credentials" .Values.scriptRunner.serviceAccount.roleArn }}
  {{- end }}
  {{- else if eq (include "matillion-runner.cloudProvider" .) "azure" }}
  {{- if .Values.azure.workloadIdentity.enabled }}
  annotations:
    azure.workload.identity/client-id: {{ required "scriptRunner.serviceAccount.clientId is required for Azure workload identity deployments" .Values.scriptRunner.serviceAccount.clientId }}
  {{- end }}
  {{- else if eq (include "matillion-runner.cloudProvider" .) "gcp" }}
  {{- if .Values.gcp.workloadIdentity.enabled }}
  annotations:
    iam.gke.io/gcp-service-account: {{ required "scriptRunner.serviceAccount.serviceAccountEmail is required for GCP workload identity deployments" .Values.scriptRunner.serviceAccount.serviceAccountEmail }}
  {{- end }}
  {{- end }}
  labels:
{{- include "matillion-runner.labels" . | nindent 4 }}
    {{- if and (eq (include "matillion-runner.cloudProvider" .) "azure") .Values.azure.workloadIdentity.enabled }}
    azure.workload.identity/use: "true"
    {{- end }}
    {{- if and (eq (include "matillion-runner.cloudProvider" .) "gcp") .Values.gcp.workloadIdentity.enabled }}
    app.kubernetes.io/gcp-workload-identity: "true"
    {{- end }}
{{- end }}
