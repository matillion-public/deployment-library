---
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "matillion-runner.fullname" . }}-netpol
  namespace: {{ .Release.Namespace }}
  labels:
{{- include "matillion-runner.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{- include "matillion-runner.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    # Allow Prometheus scraping
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.networkPolicy.prometheusNamespace | default "monitoring" }}
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTPS outbound (for API calls)
  - to: []
    ports:
    - protocol: TCP
      port: 443
  # Allow HTTP outbound (if needed)
  {{- if .Values.networkPolicy.allowHttp }}
  - to: []
    ports:
    - protocol: TCP
      port: 80
  {{- end }}
  # Allow SSH egress to the Shared Script Runner pods (Script Pushdown). Port
  # 2222 — the runner's actual listen port. NetworkPolicy operates at the pod
  # level so this is the runner container's port, not the Service mapping.
  {{- if .Values.scriptRunner.enabled }}
  - to:
    - podSelector:
        matchLabels:
          app: {{ include "matillion-runner.scriptRunner.fullname" . }}-pods
    ports:
    - protocol: TCP
      port: 2222
  {{- end }}
  # Allow custom egress rules
  {{- if .Values.networkPolicy.additionalEgressRules }}
  {{- toYaml .Values.networkPolicy.additionalEgressRules | nindent 2 }}
  {{- end }}
{{- end }}